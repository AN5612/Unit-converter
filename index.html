<html>
    <head>
        <link rel="stylesheet" href="index.css">
          <title>Metric/Imperial Conversion</title>
    </head>
    <body>
        <div id="div1">
          <h2>Metric/Imperial Unit Conversion</h2>
          <input id="conversion-num">
          <button id="conversion-btn">Convert</button> 
            
        </div>
        
        <div id="div2">
            <div id="length">
                <h3 id="length-1">Length (Meter/Feet)</h3>
                <p id="length-2"> ## meters = ## feet | ## feet = ## meters</p>
            </div>
            <div id="volume">
                <h3 id="volume-1">volume (Liter/Gallons)</h3>
                <p id="volume-2"> ## liters = ## gallons | ## gallons = ## liters</p>
            </div>
            <div id="mass">
                <h3 id="mass-1">Mass (Kilograms/Pounds)</h3>
                <p id="mass-2"> ## kilos = ## pounds | ## pounds = ## Kilos</p>
            </div>
        </div>
        
        
        <script src="index.js"></script>
    </body>
</html>
